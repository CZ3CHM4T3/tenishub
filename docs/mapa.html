<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TenisHub — mapa služeb</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
:root{--green-d:#1a2a21;--green:#22382c;--green-2:#2c4a39;--green-ink:#13201a;--gold:#c8a24c;--gold-l:#e0c277;--silver:#c6cdd0;--silver-d:#9aa3a6;--ink:#1b2620;--muted:#788780;--bg:#fff;--soft:#f5f8f5;--line:#e9eee9;}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;color:var(--ink);background:var(--soft);height:100vh;display:flex;flex-direction:column;overflow:hidden}
h1,h2,h3{font-family:'Sora',sans-serif;font-weight:700;letter-spacing:-.02em}
a{text-decoration:none;color:inherit}
header{background:#405c43;color:#fff;flex:none;padding:.5rem 1.4rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;box-shadow:0 2px 16px rgba(0,0,0,.22);z-index:1000}
.brand{display:inline-flex;align-items:center;gap:.55rem;font-family:'Sora';font-weight:800;font-size:1.12rem}
.brand .mark{height:30px}.brand .t{color:var(--silver)}.brand .h{color:var(--gold)}.brand .cz{color:var(--silver-d);font-size:.72em}
.back{font-size:.85rem;color:#cfe0d4}.back:hover{color:var(--gold-l)}
.main{flex:1;display:flex;min-height:0}
.panel{width:360px;flex:none;background:#fff;border-right:1px solid var(--line);padding:1.6rem 1.5rem;overflow-y:auto}
#map{flex:1;min-width:0;background:#eef1ee}
.panel h1{font-size:1.35rem;color:var(--green)}
.panel .subt{font-size:.85rem;color:var(--muted);margin:.25rem 0 1.6rem}
.lab{font-family:'Sora';font-weight:600;font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);margin:1.5rem 0 .7rem}
select{width:100%;padding:.8rem .9rem;border:1px solid var(--line);border-radius:13px;font-family:inherit;font-size:.95rem;background:var(--soft);cursor:pointer}
select:focus{outline:0;border-color:var(--gold)}
.seg{display:flex;background:var(--soft);border-radius:13px;padding:.32rem;gap:.3rem;border:1px solid var(--line)}
.seg button{flex:1;padding:.6rem;border:0;background:none;border-radius:10px;font-family:'Sora';font-weight:600;font-size:.85rem;color:var(--muted);cursor:pointer;transition:.2s}
.seg button.on{background:var(--green);color:#fff;box-shadow:0 4px 12px -4px rgba(34,56,44,.5)}
.rng{margin-top:1.1rem}
.rngval{font-family:'Sora';font-weight:800;color:var(--green);font-size:1.8rem;line-height:1}
.rngval small{font-weight:500;font-size:.9rem;color:var(--muted)}
.rngval .alt{font-size:.82rem;color:var(--gold)}
input[type=range]{width:100%;accent-color:var(--gold);margin-top:.7rem;height:6px}
.types{display:flex;flex-direction:column;gap:.55rem;margin-top:.3rem}
.type{display:flex;align-items:center;gap:.75rem;padding:.65rem .8rem;border:1px solid var(--line);border-radius:13px;cursor:pointer;transition:.18s;user-select:none}
.type:hover{background:var(--soft);border-color:#dbe4db}
.type.off{opacity:.4}
.type .tic{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;flex:none}
.type .tic svg{width:17px;height:17px;stroke:#fff;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.type b{font-weight:600;font-size:.93rem}
.type .chk{margin-left:auto;width:22px;height:22px;border-radius:7px;border:2px solid var(--line);display:grid;place-items:center;color:#fff;font-size:.78rem;transition:.18s}
.type:not(.off) .chk{background:var(--green);border-color:var(--green)}
.type.off .chk{color:transparent}
.result{margin-top:1.6rem;background:linear-gradient(155deg,var(--green-2),var(--green-d));color:#fff;border-radius:16px;padding:1.2rem 1.3rem;display:flex;align-items:center;gap:1rem}
.result .big{font-family:'Sora';font-weight:800;font-size:2.4rem;color:var(--gold-l);line-height:1}
.result small{color:#bccabf;font-size:.85rem}
/* pins */
.pin{width:34px;height:34px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:2.5px solid #fff;box-shadow:0 3px 8px rgba(0,0,0,.35);display:grid;place-items:center}
.pin svg{transform:rotate(45deg);width:16px;height:16px;stroke:#fff;fill:none;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}
.home{width:18px;height:18px;border-radius:50%;background:var(--green-ink);border:3px solid var(--gold);box-shadow:0 0 0 7px rgba(200,162,76,.22)}
/* popup */
.leaflet-popup-content-wrapper{border-radius:16px;box-shadow:0 16px 40px -12px rgba(0,0,0,.3)}
.leaflet-popup-content{margin:0;width:248px!important;font-family:'Inter',sans-serif}
.pop{padding:0}
.pop .ph{height:90px;background:linear-gradient(135deg,#dfe6df,#cdd6cd);position:relative}
.pop .ph .badge{position:absolute;left:12px;bottom:-13px;width:40px;height:40px;border-radius:11px;display:grid;place-items:center;border:2px solid #fff;box-shadow:0 3px 8px rgba(0,0,0,.25)}
.pop .ph .badge svg{width:20px;height:20px;stroke:#fff;fill:none;stroke-width:1.9}
.pop .body{padding:1.1rem 1rem .9rem}
.pop b.nm{font-family:'Sora';font-size:1.02rem;color:var(--green);display:block}
.pop .meta{font-size:.8rem;color:var(--muted);margin:.15rem 0 .5rem}
.pop .stars{color:var(--gold);font-size:.85rem}.pop .stars span{color:var(--muted)}
.pop .open{display:flex;align-items:center;justify-content:center;gap:.4rem;margin-top:.8rem;background:linear-gradient(135deg,var(--gold-l),var(--gold));color:#22150a;font-family:'Sora';font-weight:600;font-size:.86rem;padding:.6rem;border-radius:10px}
.flag{flex:none;background:var(--green-ink);color:#cfe0d4;font-size:.76rem;padding:.42rem 1rem;text-align:center}
.flag b{color:var(--gold-l)}
@media(max-width:820px){.main{flex-direction:column}.panel{width:100%;max-height:48%}}
</style>
</head>
<body>
<header>
  <a href="navrh-design.html" class="brand"><img src="assets/logo.png" alt="TenisHub" style="height:40px;width:auto;display:block"></a>
  <a href="navrh-design.html" class="back">← Zpět na web</a>
</header>

<div class="main">
  <aside class="panel">
    <h1>Najít službu</h1>
    <div class="subt">Vyber místo, dojezd a typ služby — na mapě se ukážou nejbližší specialisté.</div>
    <div class="lab">Kde hledáte?</div>
    <select id="city"></select>
    <div class="lab">Vzdálenost</div>
    <div class="seg"><button class="on" data-mode="km" id="mKm">Okruh (km)</button><button data-mode="min" id="mMin">Dojezd (min)</button></div>
    <div class="rng">
      <div class="rngval"><span id="rngNum">25</span> <small id="rngUnit">km</small> <small class="alt" id="rngAlt"></small></div>
      <input type="range" id="rng" min="5" max="250" step="5" value="25">
    </div>
    <div class="lab">Jaké služby?</div>
    <div class="types" id="types"></div>
    <div class="result"><div class="big" id="count">0</div><small>nalezených služeb<br>v okruhu</small></div>
  </aside>
  <div id="map"></div>
</div>
<div class="flag">🗺️ <b>Mapa služeb</b> — ukázková data · klikni na pin → profil specialisty (model: profil trenéra)</div>

<script>
var ICONS={
  coach:'<circle cx="10" cy="8.5" r="4.2"/><path d="M13 11.5 18 17"/>',
  club:'<path d="M5 19V9l7-4 7 4v10"/><path d="M10 19v-4h4v4"/>',
  fitness:'<path d="M7 8v8M4.5 10v4M17 8v8M19.5 10v4M7 12h10"/>',
  physio:'<path d="M3 12h4l2 5 4-12 2 7h6"/>',
  academy:'<path d="M12 5 3 9l9 4 9-4-9-4z"/><path d="M6.5 11v4c0 1.2 2.6 2.2 5.5 2.2s5.5-1 5.5-2.2v-4"/>'
};
var TYPES={
  coach:{label:'Tenisový trenér',color:'#c8a24c'},
  club:{label:'Klub / areál',color:'#2e7d4f'},
  fitness:{label:'Fitness trenér',color:'#2f6fb0'},
  physio:{label:'Fyzioterapeut',color:'#d9534f'},
  academy:{label:'Akademie / škola',color:'#7a5bc0'}
};
var CITIES=[['Praha',50.0755,14.4378],['Brno',49.1951,16.6068],['Ostrava',49.8209,18.2625],['Plzeň',49.7475,13.3776],['Liberec',50.7663,15.0543],['Olomouc',49.5938,17.2509],['Hradec Králové',50.2092,15.8328],['České Budějovice',48.9745,14.4743],['Pardubice',50.0343,15.7812],['Zlín',49.2264,17.6707],['Ústí nad Labem',50.6607,14.0323],['Karlovy Vary',50.2329,12.8711]];
var tk=Object.keys(TYPES),points=[],seed=7;
function rnd(){seed++;return (Math.sin(seed*12.9898)*43758.5453)%1;}
var FNAMES=['Jiří Novák','Petra Malá','Tomáš Dvořák','TK Slavia','Lucie Horská','Areál Na Kurtech','Martin Beneš','Eva Králová','Fyzio Centrum','Akademie Smash','David Urban','Klub LTC'];
CITIES.forEach(function(c){var n=4+Math.floor(Math.abs(rnd())*4);for(var i=0;i<n;i++){var t=tk[Math.floor(Math.abs(rnd())*tk.length)];points.push({type:t,lat:c[1]+rnd()*0.5,lng:c[2]+rnd()*0.7,city:c[0],name:FNAMES[Math.floor(Math.abs(rnd())*FNAMES.length)],rate:(4+Math.abs(rnd())).toFixed(2).slice(0,3),tel:'+420 '+(600+Math.floor(Math.abs(rnd())*200))+' '+(100+Math.floor(Math.abs(rnd())*900))+' '+(100+Math.floor(Math.abs(rnd())*900))});}});

var map=L.map('map',{scrollWheelZoom:true,zoomControl:true}).setView([49.82,15.47],7);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{maxZoom:19,attribution:'© OpenStreetMap © CARTO'}).addTo(map);
var layer=L.layerGroup().addTo(map);
var circle=L.circle([50.0755,14.4378],{radius:25000,color:'#c8a24c',weight:1.5,fillColor:'#c8a24c',fillOpacity:.07}).addTo(map);
var home=L.marker([50.0755,14.4378],{icon:L.divIcon({className:'',html:'<div class="home"></div>',iconSize:[18,18],iconAnchor:[9,9]}),zIndexOffset:1000}).addTo(map);
function pinIcon(t){return L.divIcon({className:'',html:'<div class="pin" style="background:'+TYPES[t].color+'"><svg viewBox="0 0 24 24">'+ICONS[t]+'</svg></div>',iconSize:[34,34],iconAnchor:[7,32],popupAnchor:[10,-30]});}

var center={lat:50.0755,lng:14.4378},mode='km',val=25,active={coach:1,club:1,fitness:1,physio:1,academy:1};
var citySel=document.getElementById('city');
CITIES.forEach(function(c,i){var o=document.createElement('option');o.value=i;o.textContent=c[0];citySel.appendChild(o);});
citySel.onchange=function(){var c=CITIES[+this.value];center={lat:c[1],lng:c[2]};map.setView([c[1],c[2]],9);render();};
document.getElementById('mKm').onclick=function(){setMode('km')};document.getElementById('mMin').onclick=function(){setMode('min')};
function setMode(m){mode=m;document.getElementById('mKm').classList.toggle('on',m==='km');document.getElementById('mMin').classList.toggle('on',m==='min');var r=document.getElementById('rng');
  if(m==='km'){r.max=250;document.getElementById('rngUnit').textContent='km';}else{r.max=210;if(val>210){val=210;}document.getElementById('rngUnit').textContent='min';}
  r.value=val;render();}
var rng=document.getElementById('rng');rng.oninput=function(){val=+this.value;render();};
var typesBox=document.getElementById('types');
Object.keys(TYPES).forEach(function(k){var el=document.createElement('div');el.className='type';
  el.innerHTML='<span class="tic" style="background:'+TYPES[k].color+'"><svg viewBox="0 0 24 24">'+ICONS[k]+'</svg></span><b>'+TYPES[k].label+'</b><span class="chk">✓</span>';
  el.onclick=function(){active[k]=active[k]?0:1;el.classList.toggle('off',!active[k]);render();};typesBox.appendChild(el);});
function radiusKm(){return mode==='km'?val:Math.round(val*1.17);} // dojezd→km (~70 km/h)
function render(){var c=L.latLng(center.lat,center.lng),rk=radiusKm();
  circle.setLatLng(c).setRadius(rk*1000);home.setLatLng(c);layer.clearLayers();var count=0;
  points.forEach(function(p){if(!active[p.type])return;if(c.distanceTo([p.lat,p.lng])/1000<=rk){
    var pop='<div class="pop"><div class="ph"><div class="badge" style="background:'+TYPES[p.type].color+'"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">'+ICONS[p.type]+'</svg></div></div><div class="body"><b class="nm">'+p.name+'</b><div class="meta">'+TYPES[p.type].label+' · '+p.city+'</div><div class="stars">★★★★★ <span>'+p.rate+'</span></div><a href="'+(p.type==='club'?'dashboard-areal.html':'profil-trener.html')+'" class="open">Otevřít profil →</a></div></div>';
    L.marker([p.lat,p.lng],{icon:pinIcon(p.type)}).bindPopup(pop,{closeButton:false}).addTo(layer);count++;}});
  document.getElementById('count').textContent=count;document.getElementById('rngNum').textContent=val;
  document.getElementById('rngAlt').textContent=mode==='min'?'(~'+rk+' km)':'';}
render();
</script>
</body>
</html>
